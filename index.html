<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Tabel Data - Nama, Alamat, Keterangan</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 28px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        
        /* Panel Tombol */
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-primary { background-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-success { background-color: #27ae60; }
        .btn-success:hover { background-color: #229954; transform: translateY(-2px); }
        .btn-warning { background-color: #f39c12; }
        .btn-warning:hover { background-color: #e67e22; transform: translateY(-2px); }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; transform: translateY(-2px); }
        .btn-info { background-color: #1abc9c; }
        .btn-info:hover { background-color: #16a085; transform: translateY(-2px); }
        
        /* Pencarian */
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        
        /* Tabel */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background-color: #34495e;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f9ff; }
        
        /* Tombol aksi dalam tabel */
        .action-btn {
            padding: 5px 10px;
            margin: 0 3px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .edit-btn { background-color: #f39c12; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .modal-content textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        /* Bulk add area */
        .bulk-area {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .bulk-area textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
        .bulk-example {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .stats {
            margin-top: 15px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            color: #2c3e50;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .main-container { padding: 15px; }
            th, td { padding: 8px; font-size: 12px; }
            .btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>📋 Manajemen Data</h1>
        <div class="subtitle">Nama, Alamat & Keterangan</div>
        
        <!-- Panel Tombol -->
        <div class="button-panel">
            <button class="btn btn-primary" onclick="openAddModal()">➕ Tambah Data</button>
            <button class="btn btn-info" onclick="toggleBulkMode()">📊 Tambah Banyak Data</button>
            <button class="btn btn-warning" onclick="exportData()">💾 Export JSON</button>
            <button class="btn btn-success" onclick="importData()">📂 Import JSON</button>
        </div>
        
        <!-- Pencarian Cepat -->
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari nama, alamat, atau keterangan..." onkeyup="quickSearch()">
            <button class="btn btn-primary" onclick="quickSearch()">Cari</button>
            <button class="btn btn-warning" onclick="clearSearch()">Reset</button>
        </div>
        
        <!-- Area Bulk Add -->
        <div id="bulkArea" class="bulk-area">
            <h3>Tambah Banyak Data</h3>
            <p>Format: <strong>Nama | Alamat | Keterangan</strong> (pisahkan dengan garis vertikal, satu baris satu data)</p>
            <textarea id="bulkData" rows="6" placeholder="Contoh:
Ahmad Wijaya | Jl. Merdeka No. 12, Jakarta | Karyawan tetap
Siti Nurhaliza | Perumahan Griya Asri Blok B5, Bandung | Freelance
Budi Santoso | Ds. Sukamakmur RT 02/04, Malang | Mahasiswa magang"></textarea>
            <div class="bulk-example">💡 Setiap baris: Nama | Alamat | Keterangan</div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="processBulkAdd()">Proses Tambah Banyak</button>
                <button class="btn btn-danger" onclick="toggleBulkMode()">Tutup</button>
            </div>
        </div>
        
        <!-- Tabel Data -->
        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Alamat</th>
                        <th>Keterangan</th>
                        <th style="width: 120px">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="stats" id="stats">
            Total data: <span id="totalCount">0</span> | Menampilkan: <span id="displayCount">0</span>
        </div>
    </div>
    
    <!-- Modal Tambah/Edit -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Data</h3>
            <input type="text" id="inputNama" placeholder="Nama lengkap" autocomplete="off">
            <textarea id="inputAlamat" placeholder="Alamat lengkap" rows="2"></textarea>
            <textarea id="inputKeterangan" placeholder="Keterangan" rows="2"></textarea>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveData()">Simpan</button>
                <button class="btn btn-danger" onclick="closeModal()">Batal</button>
            </div>
        </div>
    </div>
    
    <script>
        // Data utama
        let dataStore = [];
        let editIndex = -1;
        let currentSearchTerm = '';
        
        // Inisialisasi data contoh
        function initSampleData() {
            const samples = [
                { nama: "Ahmad Wijaya", alamat: "Jl. Merdeka No. 12, Jakarta", keterangan: "Karyawan tetap" },
                { nama: "Siti Nurhaliza", alamat: "Perumahan Griya Asri Blok B5, Bandung", keterangan: "Freelance" },
                { nama: "Budi Santoso", alamat: "Ds. Sukamakmur RT 02/04, Malang", keterangan: "Mahasiswa magang" },
                { nama: "Dewi Lestari", alamat: "Apartemen Green Tower Lantai 8, Surabaya", keterangan: "Manajer proyek" },
                { nama: "Eko Prasetyo", alamat: "Jl. Kenanga No. 45, Yogyakarta", keterangan: "Sedang cuti" }
            ];
            return samples;
        }
        
        // Load data dari localStorage
        function loadDataFromStorage() {
            const saved = localStorage.getItem('tabelDataApp');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        dataStore = parsed;
                        return;
                    }
                } catch(e) {}
            }
            dataStore = initSampleData();
        }
        
        // Save ke localStorage
        function saveToStorage() {
            localStorage.setItem('tabelDataApp', JSON.stringify(dataStore));
        }
        
        // Render tabel dengan filter pencarian
        function renderTable() {
            const searchTerm = currentSearchTerm.toLowerCase().trim();
            let filteredData = dataStore;
            
            if (searchTerm !== '') {
                filteredData = dataStore.filter(item => 
                    item.nama.toLowerCase().includes(searchTerm) ||
                    item.alamat.toLowerCase().includes(searchTerm) ||
                    item.keterangan.toLowerCase().includes(searchTerm)
                );
            }
            
            const tbody = document.getElementById('tableBody');
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Tidak ada data yang ditemukan</td></tr>';
                document.getElementById('displayCount').innerText = '0';
                document.getElementById('totalCount').innerText = dataStore.length;
                return;
            }
            
            let html = '';
            filteredData.forEach((item, idx) => {
                const originalIndex = dataStore.findIndex((orig, i) => 
                    orig.nama === item.nama && orig.alamat === item.alamat && orig.keterangan === item.keterangan
                );
                html += `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${escapeHtml(item.nama)}</td>
                        <td>${escapeHtml(item.alamat)}</td>
                        <td>${escapeHtml(item.keterangan)}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="openEditModal(${originalIndex})">✏️ Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteData(${originalIndex})">🗑️ Hapus</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            document.getElementById('displayCount').innerText = filteredData.length;
            document.getElementById('totalCount').innerText = dataStore.length;
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Pencarian cepat
        function quickSearch() {
            currentSearchTerm = document.getElementById('searchInput').value;
            renderTable();
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchTerm = '';
            renderTable();
        }
        
        // Modal untuk tambah data
        function openAddModal() {
            editIndex = -1;
            document.getElementById('modalTitle').innerText = 'Tambah Data Baru';
            document.getElementById('inputNama').value = '';
            document.getElementById('inputAlamat').value = '';
            document.getElementById('inputKeterangan').value = '';
            document.getElementById('modal').style.display = 'block';
        }
        
        function openEditModal(index) {
            if (index < 0 || index >= dataStore.length) return;
            editIndex = index;
            const item = dataStore[index];
            document.getElementById('modalTitle').innerText = 'Edit Data';
            document.getElementById('inputNama').value = item.nama;
            document.getElementById('inputAlamat').value = item.alamat;
            document.getElementById('inputKeterangan').value = item.keterangan;
            document.getElementById('modal').style.display = 'block';
        }
        
        function saveData() {
            const nama = document.getElementById('inputNama').value.trim();
            const alamat = document.getElementById('inputAlamat').value.trim();
            const keterangan = document.getElementById('inputKeterangan').value.trim();
            
            if (!nama) {
                alert('Nama harus diisi!');
                return;
            }
            
            if (editIndex === -1) {
                // Tambah baru
                dataStore.push({ nama, alamat, keterangan });
            } else {
                // Edit
                dataStore[editIndex] = { nama, alamat, keterangan };
            }
            
            saveToStorage();
            closeModal();
            clearSearch(); // Reset pencarian agar data baru terlihat
            renderTable();
        }
        
        function deleteData(index) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                dataStore.splice(index, 1);
                saveToStorage();
                renderTable();
            }
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editIndex = -1;
        }
        
        // Bulk add mode
        function toggleBulkMode() {
            const bulkArea = document.getElementById('bulkArea');
            bulkArea.style.display = bulkArea.style.display === 'none' ? 'block' : 'none';
        }
        
        function processBulkAdd() {
            const rawText = document.getElementById('bulkData').value;
            if (!rawText.trim()) {
                alert('Masukkan data terlebih dahulu!');
                return;
            }
            
            const lines = rawText.split(/\r?\n/);
            let addedCount = 0;
            let errorCount = 0;
            
            for (let line of lines) {
                line = line.trim();
                if (line === '') continue;
                
                // Pisahkan dengan |
                const parts = line.split('|').map(s => s.trim());
                if (parts.length >= 3) {
                    const nama = parts[0];
                    const alamat = parts[1];
                    const keterangan = parts.slice(2).join(' | '); // menggabungkan sisa jika ada lebih banyak |
                    
                    if (nama) {
                        dataStore.push({ nama, alamat, keterangan });
                        addedCount++;
                    } else {
                        errorCount++;
                    }
                } else {
                    errorCount++;
                }
            }
            
            if (addedCount > 0) {
                saveToStorage();
                renderTable();
                alert(`Berhasil menambahkan ${addedCount} data. Gagal: ${errorCount} baris`);
                document.getElementById('bulkData').value = '';
                toggleBulkMode();
            } else {
                alert('Tidak ada data valid yang ditemukan. Gunakan format: Nama | Alamat | Keterangan');
            }
        }
        
        // Export ke file JSON
        function exportData() {
            const dataStr = JSON.stringify(dataStore, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_export_${new Date().toISOString().slice(0,19)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Import dari file JSON
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm(`Import ${imported.length} data? Data yang ada akan digabung.`)) {
                                dataStore.push(...imported);
                                saveToStorage();
                                renderTable();
                                alert(`Berhasil import ${imported.length} data`);
                            }
                        } else {
                            alert('Format JSON tidak valid. Harus berupa array.');
                        }
                    } catch(err) {
                        alert('Gagal membaca file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // Tutup modal jika klik di luar
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // Inisialisasi
        loadDataFromStorage();
        renderTable();
    </script>
</body>
</html>
